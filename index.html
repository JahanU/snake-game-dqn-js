<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="media-queries.css">

  <script data-require="p5.js@*" data-semver="0.5.14"
    src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.5.14/p5.min.js"></script>
  <script data-require="p5.dom.js@*" data-semver="0.5.7"
    src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.5.7/addons/p5.dom.min.js"></script>
  <script src="https://cs.stanford.edu/people/karpathy/reinforcejs/lib/rl.js"></script>

  <!-- Favicons
        ================================================== -->
  <link rel="shortcut icon" href="favicon.png">
  <title>Snake Game</title>
</head>

<body>
  <div id="particles-js"></div>
  <div class="container-fluid py-4">
    <div class="row justify-content-center align-items-start">

      <!-- Left Column: Metrics & Controls -->
      <div class="col-12 col-md-5 col-lg-5 col-xl-4 text-white mb-4">

        <!-- Speed Slider Card -->
        <div class="card bg-dark border-secondary mb-4 shadow">
          <div class="card-body">
            <label for="speedSlider" class="d-block text-center font-weight-bold">Game Speed (Frame Delay: <span
                id="speedVal" class="text-warning">20</span> ms)</label>
            <input type="range" class="custom-range" id="speedSlider" min="1" max="250" value="20">
            <div class="d-flex justify-content-between text-muted small mt-1">
              <span>Fastest (1ms)</span>
              <span>Slowest (250ms)</span>
            </div>
          </div>
        </div>

        <!-- Dashboard Card -->
        <div class="card bg-dark border-secondary shadow">
          <div class="card-header border-secondary text-center font-weight-bold text-uppercase tracking-wider">
            DQN Training Dashboard
          </div>
          <div class="card-body">
            <div class="row text-center">
              <div class="col-6 mb-3">
                <div class="small text-muted text-uppercase">Iterations</div>
                <div id="metric-itt" class="h5 font-weight-bold text-light">0</div>
              </div>
              <div class="col-6 mb-3">
                <div class="small text-muted text-uppercase">Games Played</div>
                <div id="metric-games" class="h5 font-weight-bold text-light">0</div>
              </div>
              <div class="col-6 mb-3">
                <div class="small text-muted text-uppercase">Exploration (ε)</div>
                <div id="metric-epsilon" class="h5 font-weight-bold text-warning">0.00</div>
              </div>
              <div class="col-6 mb-3">
                <div class="small text-muted text-uppercase">TD Error</div>
                <div id="metric-tderror" class="h5 font-weight-bold text-danger">0.00</div>
              </div>
              <div class="col-6 mb-3">
                <div class="small text-muted text-uppercase">Current Score</div>
                <div id="metric-score" class="h5 font-weight-bold text-success">0</div>
              </div>
              <div class="col-6 mb-3">
                <div class="small text-muted text-uppercase">High Score</div>
                <div id="metric-highscore" class="h5 font-weight-bold text-info">0</div>
              </div>
            </div>
            <hr class="border-secondary">
            <div class="row text-center">
              <div class="col-6 mb-2">
                <div class="small text-muted text-uppercase">Game Reward</div>
                <div id="metric-cur-rew" class="h6 font-weight-bold text-info">0.00</div>
              </div>
              <div class="col-6 mb-2">
                <div class="small text-muted text-uppercase">Mean Reward</div>
                <div id="metric-mean-rew" class="h6 font-weight-bold text-success">0.00</div>
              </div>
              <div class="col-6 mb-2">
                <div class="small text-muted text-uppercase">Min Reward</div>
                <div id="metric-min-rew" class="h6 font-weight-bold text-danger">0.00</div>
              </div>
              <div class="col-6 mb-2">
                <div class="small text-muted text-uppercase">Max Reward</div>
                <div id="metric-max-rew" class="h6 font-weight-bold text-primary">0.00</div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Right Column: Game Canvas -->
      <div class="col-12 col-md-7 col-lg-7 col-xl-6 text-center content">
        <canvas class="canvas border border-secondary rounded shadow-lg" height="608" width="608"
          style="max-width: 608px;"></canvas>
      </div>

    </div>

    <!-- Footer -->
    <div class="row mt-5 justify-content-center">
      <div class="col-12 text-center text-muted py-3">
        <hr class="border-secondary mb-3">
        <p class="small mb-0">
          Made by Jahan.
          <br>Inspired by <a href="https://cs.stanford.edu/people/karpathy/reinforcejs/" target="_blank"
            class="text-info font-weight-bold">Karpathy's ReinforceJS</a>.
        </p>
      </div>
    </div>

  </div>
  <!-- container end -->
</body>
<!-- particles.js library -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
  particlesJS("particles-js", {
    "particles": {
      "number": {
        "value": 40,
        "density": {
          "enable": true,
          "value_area": 800
        }
      },
      "color": {
        "value": "#3b82f6"
      },
      "shape": {
        "type": "circle"
      },
      "opacity": {
        "value": 0.2,
        "random": true
      },
      "size": {
        "value": 3,
        "random": true
      },
      "line_linked": {
        "enable": true,
        "distance": 150,
        "color": "#3b82f6",
        "opacity": 0.08,
        "width": 1
      },
      "move": {
        "enable": true,
        "speed": 0.8,
        "direction": "none",
        "random": true,
        "straight": false,
        "out_mode": "out"
      }
    },
    "retina_detect": true
  });
</script>

<script type="text/javascript" src="fruit.js"></script>
<script type="text/javascript" src="snake.js"></script>
<script type="text/javascript" src="agent.js"></script>
<script type="text/javascript" src="draw.js"></script>

<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
  integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
  integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
  integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

</html>
